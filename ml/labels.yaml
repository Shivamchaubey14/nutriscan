# NutriScan v1 label set — FROZEN 2026-07-18 by the data audit (01_data_audit.ipynb).
# This file does not change for v1: scope discipline is the difference between
# shipping and not. 59 classes: Indian dishes + fruits/veg + common Western dishes.
#
# Naming: lowercase snake_case, singular. Each class maps to an IFCT/USDA food id
# (Day 4). Audit evidence (images available across sources, 2026-07-18):
#   - 28 classes with >=150 images (staples, Western via Food-101, capsicum)
#   - 15 produce classes with 88-119 images (usable with augmentation)
#   - 14 Indian classes at ~50 images, kept because they are core to the product;
#     listed under `backfill` — curated scraping per SRS ML-1 must raise them to
#     >=150 before the Day 5 frozen split, else they are cut then.
# 24 draft classes had zero usable images and were dropped (see audit notebook §6).

version: 1
status: frozen

classes:
  # --- Indian breakfast / snacks (12) ---
  - poha
  - idli
  - dosa
  - dhokla
  - samosa
  - kachori
  - pakora
  - pav_bhaji
  - pani_puri
  - kathi_roll
  - momos
  - chole_bhature

  # --- Indian mains (11) ---
  - dal_tadka
  - dal_makhani
  - chana_masala
  - palak_paneer
  - paneer_butter_masala
  - kadai_paneer
  - aloo_gobi
  - bhindi_masala
  - butter_chicken
  - chicken_curry
  - chicken_biryani

  # --- Breads & rice (3) ---
  - roti
  - naan
  - fried_rice

  # --- Sweets & drinks (7) ---
  - gulab_jamun
  - jalebi
  - rasgulla
  - gajar_halwa
