  - onion
  - carrot
  - cucumber
  - capsicum
  - cauliflower
  - spinach

# Classes kept below the 150-image bar (~50 images today). Curated scraping
# (SRS ML-1, scarcity risk mitigation) must backfill these to >=150 before the
# Day 5 frozen split; any class still short gets cut from the split, not from
# this file.
backfill:
  - poha
  - kachori
  - pani_puri
  - dal_tadka
  - chana_masala
  - palak_paneer
  - paneer_butter_masala
  - aloo_gobi
  - bhindi_masala
  - butter_chicken
  - chicken_biryani
  - gulab_jamun
  - rasgulla
  - gajar_halwa
  - lassi

