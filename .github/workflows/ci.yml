name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    name: lint-type-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --locked

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Typecheck
        run: uv run mypy .

      - name: Tests
        run: uv run pytest

  mobile:
    name: mobile-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: mobile

      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: mobile

  docker:
    name: docker-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t nutriscan-backend:ci .

      - name: Build inference image
        run: docker build -f inference/Dockerfile -t nutriscan-inference:ci .
