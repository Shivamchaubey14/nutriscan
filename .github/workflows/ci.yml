name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    name: lint-type-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --locked

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Typecheck
        run: uv run mypy .

      - name: Tests
        run: uv run pytest

  docker:
    name: docker-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build skeleton image
        run: docker build -f infra/Dockerfile -t nutriscan:ci .
