name: cd

on:
  push:
    branches: [main]

jobs:
  build-push:
    name: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        id: owner
        run: echo "name=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/nutriscan-backend:${{ github.sha }}
            ghcr.io/${{ steps.owner.outputs.name }}/nutriscan-backend:latest

      - name: Build & push inference
        uses: docker/build-push-action@v6
        with:
          context: .
          file: inference/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/nutriscan-inference:${{ github.sha }}
            ghcr.io/${{ steps.owner.outputs.name }}/nutriscan-inference:latest

  # Gated: runs once STAGING_HOST/STAGING_USER vars + STAGING_SSH_KEY secret are set.
  deploy-staging:
    needs: build-push
    runs-on: ubuntu-latest
    if: ${{ vars.STAGING_HOST != '' }}
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.STAGING_HOST }}
          username: ${{ vars.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd ~/nutriscan
            git pull --ff-only
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            export TAG=${{ github.sha }}
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build
            docker compose exec -T backend python manage.py migrate --noinput

  # Gated: runs once STAGING_URL var is set.
  smoke-test:
    needs: deploy-staging
    runs-on: ubuntu-latest
    if: ${{ vars.STAGING_URL != '' }}
    steps:
      - uses: actions/checkout@v4
      - run: BASE_URL=${{ vars.STAGING_URL }} bash scripts/smoke_test.sh

  # Manual approval via the "production" environment; gated on PROD_HOST.
  deploy-production:
    needs: smoke-test
    runs-on: ubuntu-latest
    environment: production
    if: ${{ vars.PROD_HOST != '' }}
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.PROD_HOST }}
          username: ${{ vars.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd ~/nutriscan
            git pull --ff-only
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            export TAG=${{ github.sha }}
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build
            docker compose exec -T backend python manage.py migrate --noinput
