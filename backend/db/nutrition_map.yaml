# NutriScan v1: vision class -> nutrition food mapping.
# Every class in ml/labels.yaml maps to one food (IFCT 2017 code or USDA FNDDS
# 2021-2023 fdc_id, both present in backend/db/seeds/) plus household portions.
# match: exact = same dish/food measured by the source; proxy = closest available
# food (documented in note) until a better source or lab value replaces it.
# Portions are per-item gram weights; exactly one carries default: true.
# Validated against labels.yaml and the seeds by tests/test_nutrition.py.

version: 1

classes:
  # --- Indian breakfast / snacks ---
  poha:
    source: USDA
    source_id: "2708951"
    match: proxy
    note: Rice, fried, meatless — closest to flattened-rice poha sauteed in oil.
    portions:
      - {unit: plate, grams: 150, default: true}
      - {unit: katori, grams: 100}
