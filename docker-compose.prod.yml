# Production override: run the images the CD pipeline built and pushed to GHCR
# instead of building locally. Layer it over the base compose file:
#   TAG=<sha> docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
#   TAG=<sha> docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build
services:
  db:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  backend:
    image: ghcr.io/shivamchaubey14/nutriscan-backend:${TAG:-latest}
    restart: unless-stopped
    environment:
      DJANGO_DEBUG: "0"

  inference:
    image: ghcr.io/shivamchaubey14/nutriscan-inference:${TAG:-latest}
    restart: unless-stopped
